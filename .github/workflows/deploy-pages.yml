name: Deploy WebGL to GitHub Pages

on:
  push:
    branches:
      - pages
    paths:
      - "webgl/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          set -euo pipefail
          test -f webgl/index.html
          mkdir -p _site
          # Copy published build only — skip Unity debug leftover
          rsync -a \
            --exclude 'Futboloid_BurstDebugInformation_DoNotShip' \
            --exclude '**/DoNotShip/**' \
            webgl/ _site/
          # GitHub Pages: treat as plain static site (no Jekyll)
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
